<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Counter</title>
        <link rel="stylesheet" href="./css/counter.css">
    </head>
    <body>
        <h1>Number of people entered:</h1>
        <h2 id="count-el">0</h2>
        <div id="buttons">
            <button id="increment-btn" onclick="increment()">Increment</button>
            <button id="decrement-btn" onclick="decrement()">Decrement</button>
            <button id="reset-btn" onclick="reset()">Reset counter</button>
            <button id="save-btn" onclick="save()">Save number</button>
        </div>
    </body>
    <script src="./scripts/counter.js"></script>
</html>
